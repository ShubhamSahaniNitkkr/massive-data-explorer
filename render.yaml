# Render.com free deploy — connect repo at https://dashboard.render.com/blueprints
# After mde-api is live, set on mde-web: PUBLIC_API_URL=https://<your-mde-api-host>/api/v1

services:
  - type: web
    name: mde-api
    runtime: node
    plan: free
    buildCommand: npm run setup && npm run build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: RECORD_COUNT_SCALE
        value: "0.05"

  - type: web
    name: mde-web
    runtime: static
    buildCommand: npm run setup && npm run build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: PUBLIC_API_URL
        sync: false
